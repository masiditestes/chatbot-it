<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Suporte IT</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .chat-wrap { display: flex; flex-direction: column; height: 100vh; max-height: 700px; width: 100%; max-width: 520px; background: #fff; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); overflow: hidden; }
    .header { display: flex; align-items: center; gap: 10px; padding: 12px 16px; background: #185FA5; color: white; flex-shrink: 0; }
    .hav { width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; font-size: 18px; }
    .hname { font-size: 14px; font-weight: 600; }
    .hstatus { font-size: 12px; opacity: 0.8; display: flex; align-items: center; gap: 4px; }
    .hdot { width: 6px; height: 6px; border-radius: 50%; background: #4ade80; }
    .ext { margin-left: auto; font-size: 12px; opacity: 0.7; }
    .cats { display: flex; gap: 6px; padding: 8px 14px; border-bottom: 1px solid #f0f0f0; overflow-x: auto; scrollbar-width: none; flex-shrink: 0; background: #fafafa; }
    .cats::-webkit-scrollbar { display: none; }
    .cat-btn { font-size: 12px; padding: 5px 11px; border-radius: 14px; border: 1px solid #ddd; color: #555; background: #fff; cursor: pointer; white-space: nowrap; display: flex; align-items: center; gap: 5px; transition: all 0.15s; flex-shrink: 0; }
    .cat-btn:hover, .cat-btn.active { background: #185FA5; color: white; border-color: #185FA5; }
    .messages { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 10px; }
    .msg { display: flex; gap: 8px; align-items: flex-end; max-width: 85%; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .bubble { padding: 9px 13px; border-radius: 16px; font-size: 13.5px; line-height: 1.55; word-break: break-word; }
    .msg.bot .bubble { background: #f0f0f0; color: #222; border-bottom-left-radius: 4px; }
    .msg.user .bubble { background: #185FA5; color: white; border-bottom-right-radius: 4px; }
    .mav { width: 28px; height: 28px; border-radius: 50%; background: #185FA5; display: flex; align-items: center; justify-content: center; font-size: 13px; color: white; flex-shrink: 0; }
    .quick-btns { display: flex; flex-wrap: wrap; gap: 6px; padding: 6px 14px 8px; flex-shrink: 0; min-height: 36px; }
    .qb { font-size: 12px; padding: 5px 10px; border-radius: 12px; background: #f0f0f0; border: none; color: #444; cursor: pointer; transition: background 0.15s; }
    .qb:hover { background: #e0e0e0; }
    .input-area { border-top: 1px solid #f0f0f0; flex-shrink: 0; }
    .preview-area { padding: 6px 14px 0; display: none; }
    .preview-wrap { position: relative; display: inline-block; }
    .preview-img { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; border: 1px solid #ddd; }
    .preview-remove { position: absolute; top: -5px; right: -5px; width: 18px; height: 18px; border-radius: 50%; background: #e24b4a; border: none; cursor: pointer; color: white; font-size: 10px; display: flex; align-items: center; justify-content: center; }
    .input-row { display: flex; gap: 8px; padding: 10px 14px; align-items: center; }
    .input-row input[type=text] { flex: 1; font-size: 13.5px; padding: 9px 13px; border-radius: 20px; border: 1px solid #ddd; outline: none; }
    .input-row input[type=text]:focus { border-color: #185FA5; }
    .upload-btn { width: 36px; height: 36px; border-radius: 50%; background: #f0f0f0; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #555; flex-shrink: 0; }
    .upload-btn:hover { background: #e0e0e0; }
    .send-btn { width: 36px; height: 36px; border-radius: 50%; background: #185FA5; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: white; font-size: 15px; flex-shrink: 0; }
    .send-btn:hover { background: #0C447C; }
    .typing { display: flex; gap: 4px; align-items: center; padding: 9px 13px; }
    .typing span { width: 6px; height: 6px; border-radius: 50%; background: #aaa; animation: bounce 1.2s infinite; }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }
    .img-bubble { max-width: 200px; border-radius: 10px; display: block; margin-top: 4px; }
    input[type=file] { display: none; }
  </style>
</head>
<body>
<div class="chat-wrap">
  <div class="header">
    <div class="hav"><i class="ti ti-device-desktop"></i></div>
    <div>
      <div class="hname">Suporte IT</div>
      <div class="hstatus"><span class="hdot"></span> Online</div>
    </div>
    <div class="ext">ext. 1234</div>
  </div>

  <div class="cats">
    <button class="cat-btn" onclick="selectCat('password')"><i class="ti ti-key"></i> Password</button>
    <button class="cat-btn" onclick="selectCat('vpn')"><i class="ti ti-shield-lock"></i> VPN</button>
    <button class="cat-btn" onclick="selectCat('email')"><i class="ti ti-mail"></i> Email</button>
    <button class="cat-btn" onclick="selectCat('impressora')"><i class="ti ti-printer"></i> Impressora</button>
  </div>

  <div class="messages" id="messages">
    <div class="msg bot">
      <div class="mav"><i class="ti ti-robot"></i></div>
      <div class="bubble">Olá! 👋 Sou o assistente de suporte IT.<br>Seleciona uma categoria ou descreve o teu problema. Também podes enviar um <strong>print ou foto</strong> do ecrã.</div>
    </div>
  </div>

  <div class="quick-btns" id="quickBtns">
    <span style="font-size:12px;color:#aaa;align-self:center;">Seleciona uma categoria acima ↑</span>
  </div>

  <div class="input-area">
    <div class="preview-area" id="previewArea">
      <div class="preview-wrap">
        <img id="previewImg" class="preview-img" src="" alt="Preview" />
        <button class="preview-remove" onclick="removeImage()"><i class="ti ti-x"></i></button>
      </div>
    </div>
    <div class="input-row">
      <button class="upload-btn" onclick="document.getElementById('fileInput').click()" title="Enviar imagem ou print">
        <i class="ti ti-photo"></i>
      </button>
      <input type="file" id="fileInput" accept="image/*" onchange="handleImage(event)" />
      <input type="text" id="userInput" placeholder="Descreve o teu problema..." onkeydown="if(event.key==='Enter')sendMessage()" />
      <button class="send-btn" onclick="sendMessage()"><i class="ti ti-send"></i></button>
    </div>
  </div>
</div>

<script>
const CATS = {
  password: { quick: ['Esqueci a minha password','A password expirou','Conta bloqueada','Mudar password do email'] },
  vpn:      { quick: ['Não consigo ligar à VPN','VPN liga mas não acedo à rede','Erro de autenticação VPN','VPN lenta'] },
  email:    { quick: ['Outlook não abre','Não recebo emails','Não consigo enviar emails','Caixa de entrada cheia'] },
  impressora: { quick: ['Impressora offline','Não imprime nada','Papel encravado','Instalar impressora nova'] }
};

let history = [];
let pendingImage = null;
let pendingImageB64 = null;
let currentCat = null;

function selectCat(cat) {
  currentCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  event.currentTarget.classList.add('active');
  const qb = document.getElementById('quickBtns');
  qb.innerHTML = CATS[cat].quick.map(q => `<button class="qb" onclick="sendQuick('${q}')">${q}</button>`).join('');
}

function sendQuick(text) {
  document.getElementById('userInput').value = text;
  sendMessage();
}

function handleImage(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    pendingImage = ev.target.result;
    pendingImageB64 = pendingImage.split(',')[1];
    document.getElementById('previewImg').src = pendingImage;
    document.getElementById('previewArea').style.display = 'block';
  };
  reader.readAsDataURL(file);
  e.target.value = '';
}

function removeImage() {
  pendingImage = null; pendingImageB64 = null;
  document.getElementById('previewArea').style.display = 'none';
  document.getElementById('previewImg').src = '';
}

function addMsg(role, text, imgSrc) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ' + (role === 'user' ? 'user' : 'bot');
  let inner = role === 'bot' ? `<div class="mav"><i class="ti ti-robot"></i></div>` : '';
  inner += `<div class="bubble">`;
  if (imgSrc) inner += `<img src="${imgSrc}" class="img-bubble" alt="Print enviado" />`;
  if (text) inner += (imgSrc ? '<br>' : '') + text.replace(/\n/g,'<br>');
  inner += `</div>`;
  div.innerHTML = inner;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg bot'; div.id = 'typin';
  div.innerHTML = `<div class="mav"><i class="ti ti-robot"></i></div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typin');
  if (t) t.remove();
}

async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text && !pendingImageB64) return;
  input.value = '';

  const catLabel = currentCat ? `[Categoria: ${currentCat}] ` : '';
  addMsg('user', catLabel + text, pendingImage);

  let userContent;
  if (pendingImageB64) {
    userContent = [
      { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: pendingImageB64 } },
      { type: 'text', text: catLabel + (text || 'Analisa esta imagem e identifica o problema de IT.') }
    ];
  } else {
    userContent = catLabel + text;
  }

  history.push({ role: 'user', content: userContent });
  removeImage();
  document.getElementById('quickBtns').innerHTML = '';
  showTyping();

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history })
    });
    const data = await res.json();
    removeTyping();
    const reply = data.content?.[0]?.text || 'Ocorreu um erro. Tenta novamente ou liga para a ext. 1234.';
    history.push({ role: 'assistant', content: reply });
    addMsg('bot', reply);
  } catch {
    removeTyping();
    addMsg('bot', 'Erro de ligação. Verifica a rede ou contacta o IT (ext. 1234).');
  }
}
</script>
</body>
</html>
